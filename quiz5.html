<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8Orders — النموذج الخامس — اختبار شامل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--g1:#0a1f18;--g2:#0d2b22;--g3:#0f3a2d;--g4:#1C4E4D;--g5:#1a6645;--g6:#1e8050;--g7:#22995c;--g8:#27b36a;--g10:#39e87c;--g12:#7df5aa;--g15:#edfbf4;--red:#e24b4a;--redl:#fde8e8;--text:#0d2b22;--text2:#2a5040;--text3:#5a7a6a;--gray1:#f5f9f7;--gray2:#e2ede8;--white:#fff;--r:14px;--rs:8px;--sh:0 2px 16px rgba(10,31,24,0.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--gray1);color:var(--text);min-height:100vh;direction:rtl}
.hdr{background:linear-gradient(135deg,var(--g1) 0%,var(--g3) 45%,var(--g5) 100%);padding:1.75rem 1.5rem 1.25rem;text-align:center;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--g10),var(--g12),var(--g10),transparent)}
.hdr-logo{font-size:26px;font-weight:900;background:linear-gradient(90deg,#fff 0%,var(--g12) 60%,var(--g10) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.2rem}
.hdr-title{color:rgba(255,255,255,.75);font-size:14px;font-weight:600}
.hdr-sub{color:rgba(255,255,255,.4);font-size:12px;margin-top:.2rem}
.wrap{max-width:680px;margin:0 auto;padding:1.5rem 1rem}
.reg{background:var(--white);border-radius:var(--r);padding:1.75rem;border:.5px solid var(--gray2);box-shadow:var(--sh);margin-bottom:1.5rem}
.reg-title{font-size:16px;font-weight:700;color:var(--g4);margin-bottom:.2rem}
.reg-sub{font-size:12px;color:var(--text3);margin-bottom:1.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:.35rem}
.field input{width:100%;padding:10px 14px;border-radius:var(--rs);border:.5px solid var(--gray2);background:var(--gray1);font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--g7);background:var(--white)}
.field input.err{border-color:var(--red);background:var(--redl)}
.btn-go{width:100%;padding:12px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--g5),var(--g8));color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;transition:opacity .2s;margin-top:.5rem}
.btn-go:hover{opacity:.88}
.quiz{display:none}
.qhdr{background:var(--white);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem;border:.5px solid var(--gray2);box-shadow:var(--sh)}
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.qagent{font-size:13px;font-weight:600;color:var(--g4)}
.qcount{font-size:12px;color:var(--text3)}
.progw{height:5px;background:var(--gray2);border-radius:3px;overflow:hidden}
.progb{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--g7),var(--g10));transition:width .4s ease}
.qcard{background:var(--white);border-radius:var(--r);padding:1.25rem 1.4rem;margin-bottom:.9rem;border:.5px solid var(--gray2);box-shadow:var(--sh);transition:border-color .2s}
.qcard.ok{border-color:var(--g8)}.qcard.bad{border-color:var(--red)}
.qnum{font-size:11px;font-weight:700;color:var(--g7);letter-spacing:1px;margin-bottom:.45rem}
.qtext{font-size:14px;font-weight:600;color:var(--text);margin-bottom:.85rem;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{padding:9px 14px;border-radius:var(--rs);border:.5px solid var(--gray2);background:var(--gray1);cursor:pointer;font-size:13px;color:var(--text2);text-align:right;font-family:'Cairo',sans-serif;font-weight:500;transition:all .15s}
.opt:hover:not(:disabled){background:var(--g15);border-color:var(--g12)}
.opt.correct{background:#edfbf4;border-color:var(--g8);color:var(--g2);font-weight:600}
.opt.wrong{background:var(--redl);border-color:var(--red);color:#7a1f1f;font-weight:600}
.opt:disabled{cursor:default}
.fb{margin-top:.65rem;padding:7px 11px;border-radius:var(--rs);font-size:12px;font-weight:600;display:none}
.fb.show{display:block}
.fb.ok{background:#edfbf4;color:var(--g2);border-right:3px solid var(--g8)}
.fb.bad{background:var(--redl);color:#7a1f1f;border-right:3px solid var(--red)}
.res{background:var(--white);border-radius:var(--r);padding:2rem 1.5rem;margin-top:1rem;text-align:center;border:.5px solid var(--gray2);box-shadow:var(--sh);display:none}
.res.show{display:block}
.res-score{font-size:52px;font-weight:900;background:linear-gradient(135deg,var(--g4),var(--g8),var(--g10));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.res-sub{font-size:13px;color:var(--text3);margin:.25rem 0 .75rem}
.res-bw{background:var(--gray2);border-radius:4px;height:10px;margin:0 auto .9rem;max-width:280px;overflow:hidden}
.res-b{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--g6),var(--g10));transition:width .8s ease}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.1rem}
.rs{background:var(--gray1);border-radius:var(--rs);padding:.7rem}
.rs-n{font-size:20px;font-weight:900}.rs-l{font-size:11px;color:var(--text3);margin-top:2px}
.res-msg{font-size:15px;font-weight:600;color:var(--text);margin-bottom:.5rem}
.es{font-size:12px;color:var(--text3);margin-bottom:1.25rem;min-height:18px}
.es.sent{color:var(--g6)}.es.fail{color:var(--red)}
.btn-retry{padding:10px 28px;border-radius:50px;border:none;background:linear-gradient(90deg,var(--g5),var(--g8));color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;transition:opacity .2s}
.btn-retry:hover{opacity:.88}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">8Orders</div>
  <div class="hdr-title">النموذج الخامس — اختبار شامل</div>
  <div class="hdr-sub">20 سؤال شامل — سجّل اسمك للبدء</div>
</div>
<div class="wrap">
  <div class="reg" id="reg">
    <div class="reg-title">بياناتك قبل الاختبار</div>
    <div class="reg-sub">ادخل اسمك وإيميلك — هيتبعت التقرير أوتوماتيك للتيم ليدر</div>
    <div class="field"><label>اسمك الكامل</label><input type="text" id="agName" placeholder="مثال: أحمد محمد"/></div>
    <div class="field"><label>إيميلك</label><input type="email" id="agEmail" placeholder="مثال: ahmed@8orders.com"/></div>
    <button class="btn-go" onclick="go()">ابدأ الاختبار ←</button>
  </div>
  <div class="quiz" id="quiz">
    <div class="qhdr">
      <div class="qmeta"><div class="qagent" id="agDisp"></div><div class="qcount" id="cnt">0 / 20</div></div>
      <div class="progw"><div class="progb" id="prog" style="width:0%"></div></div>
    </div>
    <div id="qc"></div>
    <div class="res" id="res">
      <div class="res-score" id="rs">0/20</div>
      <div class="res-sub">النموذج الخامس — اختبار شامل</div>
      <div class="res-bw"><div class="res-b" id="rb" style="width:0%"></div></div>
      <div class="res-stats">
        <div class="rs"><div class="rs-n" id="rc" style="color:#27b36a">0</div><div class="rs-l">صح</div></div>
        <div class="rs"><div class="rs-n" id="rw" style="color:#e24b4a">0</div><div class="rs-l">غلط</div></div>
        <div class="rs"><div class="rs-n" id="rp">0%</div><div class="rs-l">النسبة</div></div>
      </div>
      <div class="res-msg" id="rm"></div>
      <div class="es" id="es">جاري إرسال النتيجة...</div>
      <button class="btn-retry" onclick="location.reload()">إعادة الاختبار</button>
    </div>
  </div>
</div>
<script>
(function(){emailjs.init('k7SF8Yik9Mc7R22jE');})();
var QS=[{"t": "comp", "q": "لو العميل مش راضي بالحل — بنعمل إيه؟", "opts": ["ننهي المكالمة", "نوضحله إنه مش ممكن", "نبلغه إننا بنحاول ونرجعله في مدة محددة", "نحوله للشيفت ليدر فوراً"], "ans": 2}, {"t": "comp", "q": "الطلب البارد — الفيصل في تحديد المسؤول هو إيه؟", "opts": ["رأي العميل", "رأي المطعم", "التايم لاين ومراجعة خطوات الطلب", "قرار الشيفت ليدر"], "ans": 2}, {"t": "orders", "q": "إزاي بنعرف إن الطلب هو أول طلب للعميل على الأدمن؟", "opts": ["بيكون لونه أحمر", "بيكون لونه أزرق", "بيكون لونه أصفر", "بيكون لونه رمادي"], "ans": 1}, {"t": "company", "q": "8Orders بتقدم خدماتها في أنهي مدينة بشكل أساسي؟", "opts": ["القاهرة", "الإسكندرية", "الغردقة", "أسيوط"], "ans": 2}, {"t": "comp", "q": "في حالة الطلب المحروق — الخطوة الأولى بعد الاعتذار؟", "opts": ["إلغاء الطلب فوراً", "طلب صورة وتبليغ العميل يحتفظ بالطلب", "تعويض العميل مباشرة", "الاتصال بالمطعم فوراً"], "ans": 1}, {"t": "comp", "q": "الطلب البارد — لو المندوب معاه طلبين وسلّم الطلب البعيد الأول؟", "opts": ["المطعم", "المندوب", "الشركة", "مفيش مسؤول"], "ans": 1}, {"t": "company", "q": "في أنهي سنة تأسست 8Orders؟", "opts": ["2015", "2019", "2017", "2020"], "ans": 2}, {"t": "orders", "q": "الطلب الكاش اللي بيعدي 1000 جنيه — بيعمل إيه على الأدمن؟", "opts": ["بيتحول تلقائيًا", "بيتلغى تلقائيًا", "بيوقف في Pending ومش بيتحرك غير بتحويل الموظف", "بيروح للشيفت ليدر"], "ans": 2}, {"t": "ops", "q": "التعويض الأقصى للعميل عند مراجعة الريفيو كام؟", "opts": ["100% من قيمة الطلب", "50% بحد أقصى 200 جنيه", "25% بحد أقصى 100 جنيه", "50% بحد أقصى 500 جنيه"], "ans": 1}, {"t": "comp", "q": "الطلب الغلط — الخطأ من المكان والعميل عايز يستفيد بالطلب ويدفع فرق السعر أونلاين — بنعمل إيه؟", "opts": ["نعمل طلب فرق سعر عادي", "نطلب من العميل يعمل أوردر بأصناف بنفس قيمة الفرق", "نضيف الفرق على الطلب التالي", "نتصل بالمطعم ونحسبها"], "ans": 1}, {"t": "ops", "q": "الجودة (الكواليتي) — أبسط تعريف ليها؟", "opts": ["الابتسامة مع العميل", "تحقيق أهداف المبيعات", "عمل المهام المطلوبة بشكل صحيح طوال الوقت", "تقليل الشكاوي"], "ans": 2}, {"t": "ops", "q": "Follow Up Case — أقصى مدة للرد على العميل بعد الرجوع للمطعم؟", "opts": ["10 دقايق", "3 دقايق", "5 دقايق", "15 دقايق"], "ans": 2}, {"t": "ops", "q": "في مراجعة الريفيو — لو الريفيو مفيهوش مشكلة — بنعمل إيه؟", "opts": ["نتركه أوفلاين", "نرجع للعميل", "نطلعه أونلاين", "نبعته للتيم ليدر"], "ans": 2}, {"t": "comp", "q": "الطلب البارد — مين المسؤول لو في ضغط أوردرات وعدم وجود مناديب؟", "opts": ["المطعم", "المندوب", "الشركة", "العميل"], "ans": 2}, {"t": "orders", "q": "إزاي بنأكد الطلب على النظام بعد التأكيد مع العميل؟", "opts": ["بنضغط Confirm", "بنضغط Accept", "بنضغط Proceed Order ثم Rest Pending", "بنضغط Approve"], "ans": 2}, {"t": "ops", "q": "البروسيس تايم لمعظم المتاجر كام؟", "opts": ["10 دقايق", "5 دقايق", "15 دقايق", "3 دقايق"], "ans": 1}, {"t": "comp", "q": "الطلب المقلوب — لو الخطأ من المندوب والعميل عايز يرجعه — التعويض على حساب مين؟", "opts": ["الشركة", "المطعم", "المندوب", "العميل"], "ans": 2}, {"t": "comms", "q": "القسايم (Vouchers) — ليه بتختلف من عميل لتاني؟", "opts": ["لأن كل عميل بيختار قسيمته", "لأنها بتتحسب على عوامل كتير زي عدد الطلبات والاستهلاك", "لأن الشركة بتحددها يدوياً", "لأنها بتتوزع بالظبط"], "ans": 1}, {"t": "comp", "q": "في الأوردر الناقص — لو الصنف موجود مع المندوب — بنعمل إيه؟", "opts": ["نطلب من المندوب يرجع يستلم صنف جديد", "نطلب من المندوب يوصل الصنف الموجود للعميل", "نعوض العميل بالمبلغ", "نطلب من المطعم يعمل صنف جديد"], "ans": 1}, {"t": "ops", "q": "مخبز الباشا — بيستخدم لإيه غير العيش السياحي؟", "opts": ["طلبات المطاعم المتأخرة", "تحصيل فرق السعر وحل المشاكل", "طلبات الجملة", "خدمة الكيتو"], "ans": 1}];
var TITLE='النموذج الخامس — اختبار شامل';
var TL='ebtisam.hassan@8orders.com';
var SHEET='https://script.google.com/macros/s/AKfycbzSS_DLzjf11bNo8JiRRshbng6dw1y71v2u1kGPy3LOgVYvqxj3fbrFBJCgbeGi918ORA/exec';
var done=0,cor=0,agName='',agEmail='';

function go(){
  var n=document.getElementById('agName').value.trim();
  var em=document.getElementById('agEmail').value.trim();
  var ok=true;
  if(!n){document.getElementById('agName').classList.add('err');ok=false;}
  else document.getElementById('agName').classList.remove('err');
  if(!em){document.getElementById('agEmail').classList.add('err');ok=false;}
  else document.getElementById('agEmail').classList.remove('err');
  if(!ok)return;
  agName=n; agEmail=em;
  document.getElementById('reg').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('agDisp').textContent=agName;
  build();
}

function build(){
  var c=document.getElementById('qc');
  c.innerHTML='';
  for(var qi=0;qi<QS.length;qi++){
    var q=QS[qi];
    var opts='';
    for(var oi=0;oi<q.opts.length;oi++){
      opts+='<button class="opt" onclick="ans('+qi+','+oi+')" id="o_'+qi+'_'+oi+'">'+q.opts[oi]+'</button>';
    }
    c.innerHTML+='<div class="qcard" id="qc_'+qi+'"><div class="qnum">سؤال '+(qi+1)+' من 20</div><div class="qtext">'+q.q+'</div><div class="opts">'+opts+'</div><div class="fb" id="fb_'+qi+'"></div></div>';
  }
}

function ans(qi,oi){
  var card=document.getElementById('qc_'+qi);
  if(card.dataset.d)return;
  card.dataset.d='1';
  card.dataset.chosen=String(oi);
  var q=QS[qi];
  var ok=(oi===q.ans);
  if(ok)cor++;
  done++;
  for(var i=0;i<q.opts.length;i++){
    var b=document.getElementById('o_'+qi+'_'+i);
    b.disabled=true;
    if(i===q.ans)b.classList.add('correct');
    else if(i===oi&&!ok)b.classList.add('wrong');
  }
  var fb=document.getElementById('fb_'+qi);
  fb.className='fb show '+(ok?'ok':'bad');
  fb.textContent=ok?'صح! إجابة ممتازة':'غلط — الإجابة الصح: '+q.opts[q.ans];
  card.classList.add(ok?'ok':'bad');
  var pct=Math.round((done/20)*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('cnt').textContent=done+' / 20';
  if(done===20)showRes();
}

function showRes(){
  var pct=Math.round((cor/20)*100);
  var wr=20-cor;
  document.getElementById('rs').textContent=cor+'/20';
  document.getElementById('rc').textContent=cor;
  document.getElementById('rw').textContent=wr;
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('rb').style.width=pct+'%';
  var msgs=[[0,49,'محتاج مراجعة أكتر — راجع الـ Training Hub وحاول تاني'],[50,69,'مقبول — بس محتاج تثبت المعلومة أكتر'],[70,84,'كويس جداً — إنت على الطريق الصح'],[85,94,'ممتاز — أداء رائع'],[95,100,'مثالي — إنت بتاع 8Orders الأصيل']];
  var msg=null;
  for(var i=0;i<msgs.length;i++){if(pct>=msgs[i][0]&&pct<=msgs[i][1]){msg=msgs[i];break;}}
  document.getElementById('rm').textContent=msg?msg[2]:'';
  var rc=document.getElementById('res');
  rc.classList.add('show');
  rc.scrollIntoView({behavior:'smooth',block:'start'});
  sendAll(cor,wr,pct);
}

function sendAll(cor,wr,pct){
  var now=new Date();
  var d=now.toLocaleDateString('ar-EG')+' '+now.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  var wrongAnswers=[];
  for(var qi=0;qi<QS.length;qi++){
    var card=document.getElementById('qc_'+qi);
    if(card&&card.dataset.d){
      var chosen=parseInt(card.dataset.chosen);
      var q=QS[qi];
      if(chosen!==q.ans){
        wrongAnswers.push({question:q.q,agent_answer:q.opts[chosen]||'لم يجب',correct_answer:q.opts[q.ans]});
      }
    }
  }
  try{
    fetch(SHEET,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent_name:agName,agent_email:agEmail,quiz_name:TITLE,score:cor+'/20',correct:cor,wrong:wr,percentage:pct+'%',date:d,wrong_answers:wrongAnswers})});
  }catch(e){}
  emailjs.send('service_wwpzphf','template_kn3bxey',{to_email:TL,to_name:'Team Leader',agent_name:agName,agent_email:agEmail,tl_email:TL,quiz_name:TITLE,score:cor+'/20',correct:cor,wrong:wr,percentage:pct+'%',date:d})
    .then(function(){var e=document.getElementById('es');e.textContent='تم إرسال النتيجة للتيم ليدر بنجاح';e.className='es sent';})
    .catch(function(err){var e=document.getElementById('es');e.textContent='تعذّر إرسال الإيميل';e.className='es fail';});
}
</script>
</body>
</html>
